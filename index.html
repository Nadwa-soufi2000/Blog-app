<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="posts.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <span class="brand-logo" aria-label="Blog app logo">
                    <svg viewBox="0 0 48 48" aria-hidden="true" focusable="false">
                        <rect x="8" y="12" width="32" height="24" rx="8" fill="currentColor" />
                        <path d="M16 20h10a4 4 0 010 8H16" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" />
                        <path d="M24 26h6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" />
                    </svg>
                </span>
                <div class="brand-text">
                    <div class="brand-title">Blog App</div>
                    <div class="brand-subtitle">Reliable posts, smart reads</div>
                </div>
            </div>
            <div class="header-badge">
                <span class="badge">1</span>
                <span class="badge-label">Favorite Posts</span>
            </div>
        </div>
    </header>
    <main>
        <h1>Posts List</h1>
        <div class="posts-container"></div>
    </main>
    <main>
        <h1>FavoritePosts List</h1>
        <div class="posts-container"></div>
    </main>

    <script src="script.js"></script>
    <script src="Posts.js"></script>
    <script src="FavoritePosts.js"></script>
</body>
</html>
